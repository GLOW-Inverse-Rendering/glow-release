defaults:
  - _self_
  - model: default

general:
#   base_exp_dir: ./exp/CASE_NAME/nomask
  recording:
    - ./
    - ./models
dataset:
    class: ???
    data_dir: ./datasets/${.class}/CASE_NAME/
    render_cameras_name: cameras_sphere.npz
    object_cameras_name: cameras_sphere.npz
    ignore_mask: ???
    apply_gamma: False
    use_pcd: ???
    limit_size:
    override_case: null
    use_0_5_convention: false
    
# dataset_val:
