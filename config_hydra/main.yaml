defaults:
  - conf: real
  - _self_
  - mitsuba_renderer: null
  

hydra:
  run:
    dir: ./exp/${case}/${eval:'"nomask_${exp_suffix}" if "${exp_suffix}" is not None else "nomask" '}
mode: train
mcube_threshold: 0.0
is_continue: false
gpu: 0
case: ""
disable_bake_texture: false
exp_suffix: null
distill_suffix: null
distill_conf: null
disable_scaler: true
debug_error: false
set_s: null
is_world: false
mitsuba_renderer: 
latest_model_name:

